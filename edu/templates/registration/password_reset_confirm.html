{% extends 'edu/base.html' %}
{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 75vh; background: linear-gradient(135deg, #e8f0fe, #ffffff);">
  <div class="card shadow-lg p-5" style="border-radius: 16px; max-width: 450px; width:100%;">
    <h3 class="text-center mb-4" style="color:#065a0a;">Set a New Password 🔐</h3>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-success w-100 mt-3">Change Password</button>
    </form>
  </div>
</div>

{% endblock %}
