{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Website</title>

    <!-- Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        .nav-link {
            color: white !important;
            font-weight: 900;
        }
        .nav-link:hover {
            color: lightgoldenrodyellow !important;
        }
        .navbar-toggler {
            border: none;
            background: none;
        }
        .navbar-toggler:focus {
            outline: none;
            box-shadow: none;
        }
        .navbar-toggler-icon {
            background-image: url("data:image/svg+xml;charset=utf8,%3Csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath stroke='white' stroke-width='3' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3E%3C/svg%3E");
        }

        .login-btn, .logout-btn {
            background-color: blanchedalmond;
            color: black;
            padding: 8px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        .login-btn:hover, .logout-btn:hover {
            background-color:peachpuff;
            color:black;
        }

        .welcome-text {
            color: white;
            font-weight: 600;
            margin-right: 15px;
        }

        .main-nav {
            background-color: #1E5132;
        }
    </style>
</head>

<body>

<!-- ✅ Responsive Navbar -->
<nav class="navbar navbar-expand-lg main-nav shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="{% static 'images/logo.png' %}" alt="logo" class="nav-logo">
        </a>

        <!-- ✅ Toggle button for mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- ✅ Navbar links -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto text-center">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About us</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'courses' %}">Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'gallery' %}">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact us</a></li>
            </ul>

            <!-- ✅ Conditional Login/Logout -->
            <div class="text-center mt-2 mt-lg-0 d-flex align-items-center justify-content-center">
                {% if user.is_authenticated %}
                    <span class="welcome-text">Welcome, {{ user }}</span>
                    <a href="{% url 'logout' %}" class="logout-btn">LOGOUT</a>
                {% else %}
                    <a href="{% url 'login' %}" class="login-btn">LOGIN</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<!-- ✅ Flash Messages -->

  <div class="container mt-3">
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show text-center" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  </div>
{% endif %} -->

<!-- ✅ Page Content -->
{% block content %}
{% endblock %}

<!-- ✅ Footer -->
{% include 'edu/footer.html' %}

<!-- ✅ Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

{% block scripts %}
{% endblock %}

</body>
</html>
