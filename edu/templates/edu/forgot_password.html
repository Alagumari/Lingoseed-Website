{% extends 'edu/base.html' %}
{% block content %}

<style>
body {
  background: linear-gradient(135deg, #e8f0fe, #ffffff);
}

.forgot-container {
  min-height: 80vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.forgot-card {
  background: #fff;
  padding: 40px 50px;
  border-radius: 16px;
  box-shadow: 0 6px 25px rgba(0, 0, 0, 0.1);
  width: 100%;
  max-width: 450px;
  text-align: center;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.forgot-card h2 {
  color: #065a0a;
  font-weight: 600;
  margin-bottom: 10px;
}

.forgot-card p {
  color: #555;
  margin-bottom: 25px;
}

.forgot-card button {
  width: 100%;
  height: 45px;
  border-radius: 8px;
  background: #065a0a;
  color: white;
  border: none;
  font-weight: 500;
  transition: 0.3s;
}

.forgot-card button:hover {
  background: rgba(6, 90, 10, 0.8);
}
</style>

<div class="forgot-container">
  <div class="forgot-card">
    <h2>Forgot Password</h2>
    <p>Enter your registered email address to receive a reset link.</p>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3 text-start">
        <label for="email" class="form-label fw-semibold">Email Address</label>
        <input type="email" name="email" id="email" class="form-control shadow-sm" placeholder="Enter your email" required>
      </div>
      <button type="submit">Send Reset Link</button>
    </form>

    <div class="mt-3">
      <a href="{% url 'login' %}" class="text-decoration-none" style="color:#065a0a;">← Back to Login</a>
    </div>
  </div>
</div>

{% endblock %}
